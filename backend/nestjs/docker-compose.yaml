services:
  mailhog:
    image: mailhog/mailhog
    restart: no
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

  postgres:
    image: postgres:17.5
    restart: no
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-kalamche}
    ports:
      - 5432:5432

  s3:
    image: rustfs/rustfs:latest
    restart: no
    environment:
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_ENABLE: true
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_ACCESS_KEY: ${AWS_S3_ACCESS_KEY:-admin}
      RUSTFS_SECRET_KEY: ${AWS_S3_SECRET_KEY:-admin}
    ports:
      - 9000:9000
      - 9001:9001

  meilisearch:
    image: getmeili/meilisearch:latest
    restart: no
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY}
    ports:
      - 7700:7700
