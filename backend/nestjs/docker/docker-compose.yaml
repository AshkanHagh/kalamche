services:
  mailhog:
    image: mailhog/mailhog
    restart: no
    ports:
      - "1025:1025"
      - "8025:8025"

  postgres:
    image: postgres:17.5
    restart: no
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-kalamche}
    ports:
      - 5432:5432

  s3:
    image: rustfs/rustfs:latest
    restart: no
    environment:
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_ENABLE: true
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_ACCESS_KEY: ${AWS_S3_ACCESS_KEY:-admin}
      RUSTFS_SECRET_KEY: ${AWS_S3_SECRET_KEY:-admin}
    ports:
      - 9000:9000
      - 9001:9001

  meilisearch:
    image: getmeili/meilisearch:latest
    restart: no
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY}
    ports:
      - 7700:7700

  kafka-broker:
    image: apache/kafka:latest
    restart: no
    ports:
      - 9092:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # 9092 = for host machine access, 29092 = for other containers, 9093 = controller
      KAFKA_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka-broker:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # PLAINTEXT_HOST and PLAINTEXT are both just names we made up — both use the PLAINTEXT protocol.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      # self-referencing controller voter
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      kafka-broker:
        condition: service_started
    volumes:
      - ./kafka-topic-init.sh:/kafka-topic-init.sh:ro
    command: ["sh", "/kafka-topic-init.sh"]
    init: true
